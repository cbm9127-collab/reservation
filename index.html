<html lang="ko">
<head>

<title>환경교육 프로그램 예약</title>
<style>
  :root {
    --green:#2D9E6B;--green-dark:#1A7A50;--green-light:#E8F7F1;
    --green-mid:#A8DBBF;
    --yellow:#F9C846;--yellow-light:#FEF9E7;
    --blue:#4A90D9;--blue-light:#EBF4FD;
    --red:#E85D5D;--red-light:#FDEEEE;
    --bg:#F7FBF9;--white:#FFFFFF;--surface:#F0F7F3;
    --text:#1E3A2F;--text-2:#4A7060;--text-3:#8AADA0;
    --border:rgba(45,158,107,0.12);
    --radius:16px;--radius-sm:10px;--radius-xs:6px;
    --shadow:0 2px 12px rgba(45,158,107,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .hero{background:linear-gradient(135deg,#2D9E6B 0%,#1A7A50 100%);padding:2.5rem 1.25rem 3rem;text-align:center;position:relative;overflow:hidden;}
  .hero::before{content:'🌿';font-size:120px;position:absolute;right:-20px;top:-20px;opacity:.15;}
  .hero::after{content:'🍃';font-size:80px;position:absolute;left:-10px;bottom:-10px;opacity:.15;}
  .hero-badge{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:12px;}
  .hero h1{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:8px;}
  .hero p{font-size:14px;color:rgba(255,255,255,.85);line-height:1.6;}
  .wrapper{max-width:760px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
  .calendar-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:1.5rem;}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .cal-title{font-size:18px;font-weight:700;color:var(--text);}
  .cal-nav{display:flex;gap:6px;}
  .cal-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface);color:var(--text-2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .cal-btn:hover{background:var(--green-light);color:var(--green-dark);border-color:var(--green-mid);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text-3);padding:6px 0;letter-spacing:.3px;}
  .cal-dow:first-child{color:#E85D5D;}
  .cal-dow:last-child{color:var(--blue);}
  .cal-day{min-height:52px;border-radius:var(--radius-xs);padding:5px;cursor:default;position:relative;transition:all .15s;}
  .cal-day.other{opacity:.3;}
  .cal-day.today .day-num{background:var(--yellow);color:var(--text);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .cal-day.has-program{background:var(--red-light);border:1.5px solid #F5A8A8;cursor:default;}
  .day-num{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
  .cal-day:first-child .day-num,.day-sun .day-num{color:#E85D5D;}
  .day-sat .day-num{color:var(--blue);}
  .edu-badge{display:inline-block;background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:2px;}
  .section-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .target-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .target-tab{flex:1;min-width:60px;padding:10px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--white);color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
  .target-tab:hover{border-color:var(--green-mid);color:var(--green-dark);background:var(--green-light);}
  .target-tab.active{background:var(--green);color:#fff;border-color:var(--green);}
  .target-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
  .target-card-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .target-icon{font-size:36px;}
  .target-title{font-size:18px;font-weight:700;color:var(--text);}
  .target-desc{font-size:13px;color:var(--text-2);margin-top:3px;line-height:1.5;}
  .target-prog-list{display:flex;flex-direction:column;gap:10px;}
  .target-prog-item{background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .target-prog-name{font-size:14px;font-weight:600;color:var(--text);}
  .target-prog-meta{font-size:12px;color:var(--text-2);margin-top:3px;}
  .target-prog-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--green-light);color:var(--green-dark);white-space:nowrap;}
  .flow-strip{display:flex;align-items:center;justify-content:center;gap:16px;background:var(--green-light);border-radius:var(--radius-sm);padding:20px 16px;margin-bottom:0;flex-wrap:wrap;}
  .flow-step{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .flow-num{width:42px;height:42px;border-radius:50%;background:var(--green);color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(45,158,107,.3);}
  .flow-text{font-size:13px;color:var(--text-2);text-align:center;line-height:1.6;font-weight:600;}
  .flow-arrow{font-size:22px;color:var(--green-mid);font-weight:700;}
  .hero-char-left{position:absolute;left:0;bottom:0;width:110px;opacity:.92;pointer-events:none;}
  .hero-char-right{position:absolute;right:8px;top:10px;width:75px;opacity:.88;pointer-events:none;}
  .dui-float{position:fixed;right:16px;bottom:80px;width:72px;cursor:pointer;transition:transform .2s;z-index:99;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));}
  .dui-float:hover{transform:scale(1.1) rotate(-5deg);}
  #loading{display:none;flex-direction:column;align-items:center;justify-content:center;padding:4rem 0;gap:1rem;}
  .spinner{width:32px;height:32px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #error-box{display:none;background:var(--red-light);border:1px solid #FCA5A5;border-radius:var(--radius-sm);padding:16px;color:#7F1D1D;font-size:13px;margin-bottom:1rem;}
  #content{display:block;}
  .info-strip{background:var(--blue-light);border-radius:var(--radius-sm);padding:12px 16px;font-size:12px;color:#1A4A7A;line-height:1.7;margin-bottom:1.5rem;}
  .legend{display:flex;gap:16px;align-items:center;margin-top:12px;padding:10px 14px;background:var(--surface);border-radius:var(--radius-sm);flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2);font-weight:600;}
  .legend-box{width:20px;height:20px;border-radius:4px;}

  /* ── 버튼 2개 나란히 ── */
  .btn-row{display:flex;gap:10px;margin-bottom:12px;}
  .btn-half{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 10px;font-size:15px;font-weight:700;border-radius:var(--radius);text-decoration:none;transition:all .2s;text-align:center;cursor:pointer;border:none;}
  .btn-info{background:var(--white);color:var(--green-dark);border:2px solid var(--green);box-shadow:0 2px 8px rgba(45,158,107,.12);}
  .btn-info:hover{background:var(--green-light);transform:translateY(-2px);box-shadow:0 4px 16px rgba(45,158,107,.2);}
  .btn-apply{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(45,158,107,.3);}
  .btn-apply:hover{background:var(--green-dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(45,158,107,.4);}

  /* ── 프로그램 소개 팝업 (모달) ── */
  .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--bg);border-radius:var(--radius);width:100%;max-width:700px;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.2);}
  .modal-header{position:sticky;top:0;background:var(--green);color:#fff;padding:16px 20px;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between;z-index:10;}
  .modal-header-title{font-size:17px;font-weight:700;}
  .modal-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .modal-close:hover{background:rgba(255,255,255,.4);}
  .modal-body{padding:20px;}
</style>
</head>

var bookedDates  = {};
var currentYear  = new Date().getFullYear();
var currentMonth = new Date().getMonth();

var MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
var DAYS   = ['일','월','화','수','목','금','토'];

/* ── 모달 열기/닫기 ── */
function openModal(){
  document.getElementById('programModal').classList.add('show');
  document.body.style.overflow='hidden';
  var firstTab=document.querySelector('.target-tab');
  if(firstTab)setTarget('유아',firstTab);
}
function closeModal(){
  document.getElementById('programModal').classList.remove('show');
  document.body.style.overflow='';
}
document.getElementById('programModal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

/* ── 캘린더 ── */
function renderCalendar(){
  var title=document.getElementById('cal-title');
  var grid=document.getElementById('cal-grid');
  title.textContent=currentYear+'년 '+MONTHS[currentMonth];
  grid.innerHTML='';

  DAYS.forEach(function(d){
    var el=document.createElement('div');
    el.className='cal-dow';el.textContent=d;grid.appendChild(el);
  });

  var firstDay=new Date(currentYear,currentMonth,1).getDay();
  var daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  var today=new Date();

  var prevDays=new Date(currentYear,currentMonth,0).getDate();
  for(var i=0;i<firstDay;i++){
    var el=document.createElement('div');
    el.className='cal-day other';
    el.innerHTML='<div class="day-num">'+(prevDays-firstDay+i+1)+'</div>';
    grid.appendChild(el);
  }

  for(var d=1;d<=daysInMonth;d++){
    var dateStr=currentYear+'-'+String(currentMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday=(today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===d);
    var isBooked=!!bookedDates[dateStr];
    var dow=new Date(currentYear,currentMonth,d).getDay();

    var cls='cal-day';
    if(dow===0)cls+=' day-sun';
    if(dow===6)cls+=' day-sat';
    if(isToday)cls+=' today';
    if(isBooked)cls+=' has-program';

    var el=document.createElement('div');
    el.className=cls;

    var numEl=document.createElement('div');
    numEl.className='day-num';numEl.textContent=d;
    el.appendChild(numEl);

    if(isBooked){
      var badge=document.createElement('div');
      badge.className='edu-badge';
      badge.textContent='예약됨';
      el.appendChild(badge);
    }
    grid.appendChild(el);
  }

  var totalCells=firstDay+daysInMonth;
  var remaining=totalCells%7===0?0:7-(totalCells%7);
  for(var n=1;n<=remaining;n++){
    var el=document.createElement('div');
    el.className='cal-day other';
    el.innerHTML='<div class="day-num">'+n+'</div>';
    grid.appendChild(el);
  }
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  renderCalendar();
}

function setTarget(target,btn){
  document.querySelectorAll('.target-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var data=TARGET_DATA[target];
  var el=document.getElementById('target-content');
  var sectionsHtml=data.sections.map(function(sec){
    var progHtml=sec.programs.map(function(p){
      return '<div class="target-prog-item"><div style="flex:1">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
        +'<div class="target-prog-name">'+p.name+'</div>'
        +'<span class="target-prog-tag">'+p.tag+'</span></div>'
        +'<div class="target-prog-meta">⏱ '+p.time+' &nbsp;·&nbsp; 📍 '+p.place+'</div>'
        +'<div style="font-size:12px;color:var(--text-2);margin-top:5px;line-height:1.6;">'+p.desc+'</div>'
        +'<div style="font-size:12px;color:var(--green-dark);font-weight:600;margin-top:5px;">💰 '+p.fee+'</div>'
        +'</div></div>';
    }).join('');
    return '<div style="margin-bottom:16px;">'
      +'<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;padding:6px 0;border-bottom:1.5px solid var(--green-light);">'+sec.title+'</div>'
      +'<div class="target-prog-list">'+progHtml+'</div></div>';
  }).join('');
  el.innerHTML='<div class="target-card">'
    +'<div class="target-card-header">'
    +'<div class="target-icon">'+data.icon+'</div>'
    +'<div><div class="target-title">'+data.title+'</div>'
    +'<div class="target-desc">'+data.desc+'</div></div></div>'
    +sectionsHtml
    +'<div style="margin-top:14px;padding:12px;background:var(--green-light);border-radius:var(--radius-sm);font-size:12px;color:var(--green-dark);line-height:1.7;">'
    +'📞 상담 문의: 041-572-2572 (화~토) 09:00~18:00<br>'
    +'운영 일정 및 교육 시간, 금액은 상담을 통해 협의 가능합니다.<br>'
    +'교육 및 방문은 최소 2주 전에 신청 부탁드립니다.</div></div>';
}

/* ── 데이터 로드 ── */
async function init(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  try{
    var res=await fetch(API_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    var data=await res.json();
    var programs=data.programs||[];
    bookedDates={};
    programs.forEach(function(p){
      if(p.date) bookedDates[p.date]=true;
    });
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    renderCalendar();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('error-box').style.display='block';
    document.getElementById('err-msg').textContent='일정을 불러오지 못했어요: '+e.message;
    renderCalendar();
  }
}

window.addEventListener('DOMContentLoaded',function(){init();});
</script>
